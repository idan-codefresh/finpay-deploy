apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    # Source 1: Helm chart from public OCI registry
    - repoURL: ghcr.io/nginx/charts
      chart: nginx-ingress
      targetRevision: 2.5.0
      helm:
        valueFiles:
          - $values/nginx-ingress/values.yaml

    # Source 2: Values file from Git
    - repoURL: https://github.com/idan-codefresh/finpay-deploy.git
      targetRevision: main
      ref: values
