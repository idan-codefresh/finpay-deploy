apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finpay-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/idan-codefresh/finpay-deploy.git
    targetRevision: main
    path: argocd-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
