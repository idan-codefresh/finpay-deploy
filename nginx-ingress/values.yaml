controller:
  image:
    tag: "5.4.0"

  replicaCount: 2

  service:
    type: LoadBalancer
    externalTrafficPolicy: Local

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false

  config:
    proxy-body-size: "10m"
    use-forwarded-headers: "true"

  metrics:
    enabled: true

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"
